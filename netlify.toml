[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "22"
  # VITE_API_BASE se setea en Netlify UI → Site settings → Environment variables
  # Valor: https://media-studio-api-XXXX.southamerica-east1.run.app
  # (la URL del Cloud Run del backend)

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
