[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "22"

# Proxy same-origin: el front pega a /api/* (relativo) y Netlify reenvia
# al backend Cloud Run. Sin URL en el bundle -> sin secrets scanning ni CORS.
# DEBE ir ANTES del redirect SPA /*.
[[redirects]]
  from   = "/api/*"
  to     = "https://media-studio-api-vmpxsxe7ra-rj.a.run.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
