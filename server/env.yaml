# Variables de entorno para el backend en Cloud Run.
# Subir con:
#   gcloud run deploy media-studio-api \
#     --image=southamerica-east1-docker.pkg.dev/munify-api/media-studio/api:latest \
#     --region=southamerica-east1 --allow-unauthenticated --port=8080 \
#     --env-vars-file=server/env.yaml \
#     --set-secrets=CLOUDINARY_API_SECRET=MEDIA_STUDIO_CLD_SECRET:latest,GEMINI_API_KEY=MEDIA_STUDIO_GEMINI_KEY:latest \
#     --project=munify-api
#
# Secretos en Secret Manager (proyecto munify-api):
#   MEDIA_STUDIO_CLD_SECRET  → Cloudinary API Secret
#   MEDIA_STUDIO_GEMINI_KEY  → Gemini API Key

NODE_ENV: "production"
IS_PROD: "true"
STUDIO_PORT: "8080"
CLOUDINARY_CLOUD_NAME: "tu-cloud-name"
CLOUDINARY_API_KEY: "tu-api-key"
CLOUDINARY_FOLDER: "media-studio"
